spring:
  datasource:
    url: jdbc:mysql://localhost:3306/barbearia
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database: mysql
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

api:
  security:
    token:
      secret: ${JWT_SECRET:my-secret-key}